# docker-compose.yml moved to Build/Docker/

services:
  postgres:
    image: postgres:16
    # container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "Host"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d Host" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin-service:
    build:
      context: ../../
      dockerfile: Build/Docker/AdministrationService/Dockerfile
    # container_name: erp-admin-api
    restart: unless-stopped
    ports:
      - "7027:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=Host;Username=postgres;Password=123456
      - SignalRService__BaseUrl=http://signalr:8080
      - Seq__ServerUrl=http://seq:5341
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - app-network

  gateway:
    build:
      context: ../../
      dockerfile: Build/Docker/Gateway/Dockerfile
    # container_name: erp-gateway
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
      # Cấu hình YARP dùng tên container trong nội bộ docker
      - ReverseProxy__Clusters__admin-cluster__Destinations__admin-service__Address=http://admin-service:8080
      - ReverseProxy__Clusters__signalr-cluster__Destinations__signalr-service__Address=http://signalr:8080
      - JwtSettings__Authority=http://admin-service:8080
      - Seq__ServerUrl=http://seq:5341
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      admin-service:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - app-network

  signalr:
    build:
      context: ../../
      dockerfile: Build/Docker/SignalRService/Dockerfile
    # container_name: erp-signalr
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Seq__ServerUrl=http://seq:5341
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      admin-service:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: ../../
      dockerfile: Build/Docker/my-nextjs/Dockerfile
    # container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_ADMIN_URL=/api/proxy
      - BACKEND_URL=http://gateway:8080
      - NEXT_PUBLIC_SIGNALR_URL=http://localhost:5000/notificationHub
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - app-network

  seq:
    image: datalust/seq:latest
    # container_name: app-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin123
    ports:
      - "5341:80"
      - "5342:5341"
    volumes:
      - seq-data:/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  seq-data:
