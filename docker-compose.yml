version: '3.8'

# ⚠️ QUAN TRỌNG: Tuyệt đối không thay đổi Host Port (cổng bên trái) trong phần ports:
# trừ khi có yêu cầu cấu trúc lại toàn bộ hệ thống. Việc đổi port sẽ gây lỗi 
# kết nối Gateway (YARP) và Frontend Proxy.

services:
  # ----------------- Infrastructure -----------------
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Host}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "${POSTGRES_HOST_PORT:-5443}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-Host}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: erp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: erp-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_FIRSTRUN_ADMINPASSWORD:-admin123}
    ports:
      - "${SEQ_HOST_PORT:-5341}:80" # UI Port
    volumes:
      - seq_data:/data
    restart: unless-stopped

  # ----------------- Backend Services -----------------
  admin-service:
    container_name: erp-admin-service
    build:
      context: .
      dockerfile: AdministrationService/Dockerfile
    ports:
      - "${ADMIN_HOST_PORT:-7038}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=${REDIS_PASSWORD}
      - Seq__ServerUrl=http://seq:5341
      - SignalRService__BaseUrl=http://signalr:10000
    restart: unless-stopped

  file-service:
    container_name: erp-file-service
    build:
      context: .
      dockerfile: FileService/Dockerfile
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
      - Seq__ServerUrl=http://seq:5341
    restart: unless-stopped

  signalr:
    container_name: erp-signalr
    build:
      context: .
      dockerfile: SignalRService/Dockerfile
    ports:
      - "${SIGNALR_HOST_PORT:-10000}:10000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:10000
      - DOTNET_RUNNING_IN_CONTAINER=true
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=${REDIS_PASSWORD}
      - Seq__ServerUrl=http://seq:5341
    restart: unless-stopped

  # ----------------- Gateway & Frontend -----------------
  gateway:
    container_name: erp-gateway
    build:
      context: .
      dockerfile: GatewayService/Dockerfile
    ports:
      - "${GATEWAY_HOST_PORT:-5002}:8080"
    depends_on:
      - admin-service
      - file-service
    restart: unless-stopped

  frontend:
    container_name: erp-frontend
    build:
      context: ./my-nextjs
    ports:
      - "${FRONTEND_HOST_PORT:-3011}:3000"
    depends_on:
      - gateway
    restart: unless-stopped

# ----------------- Volumes -----------------
volumes:
  postgres_data:
  redis_data:
  minio_data:
  seq_data:
