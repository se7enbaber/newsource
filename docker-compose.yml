version: '3.9'

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  seq-data:
    driver: local
  qdrant-data:
    driver: local

services:
  # ═════════════════════════ DATABASES & CACHE ═════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ═════════════════════════ VECTOR DATABASE ═════════════════════════

  qdrant:
    image: qdrant/qdrant:latest
    container_name: erp-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HOST_PORT}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - app-network
    environment:
      QDRANT_API_KEY: "qdrant_key_123"
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/6333) >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ═════════════════════════ FILE STORAGE ═════════════════════════

  minio:
    image: minio/minio:latest
    container_name: erp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ═════════════════════════ LOGGING ═════════════════════════

  seq:
    image: datalust/seq:latest
    container_name: erp-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_FIRSTRUN_ADMINPASSWORD:-admin123}
    ports:
      - "${SEQ_HOST_PORT}:80"
    volumes:
      - seq-data:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ═════════════════════════ .NET BACKEND SERVICES ═════════════════════════

  admin-service:
    build:
      context: .
      dockerfile: AdministrationService/Dockerfile
    container_name: erp-admin-service
    restart: unless-stopped
    ports:
      - "${ADMIN_HOST_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION}
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=${REDIS_PASSWORD}
      - SignalRService__BaseUrl=http://signalr:8080
      - ASPNETCORE_ISSUER_URI=${ASPNETCORE_ISSUER_URI}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G

  file-service:
    build:
      context: .
      dockerfile: FileService/Dockerfile
    container_name: erp-file-service
    restart: unless-stopped
    ports:
      - "10001:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8000
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M

  signalr:
    build:
      context: .
      dockerfile: SignalRService/Dockerfile
    container_name: erp-signalr
    restart: unless-stopped
    ports:
      - "${SIGNALR_HOST_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=${REDIS_PASSWORD}
    depends_on:
      admin-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M

  gateway:
    build:
      context: .
      dockerfile: GatewayService/Dockerfile
    container_name: erp-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_HOST_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - JwtSettings__Authority=http://admin-service:8080
    depends_on:
      admin-service:
        condition: service_started
      signalr:
        condition: service_started
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M

  # ═════════════════════════ AI SERVICES ═════════════════════════

  ai-service:
    build:
      context: ./AiService
    container_name: erp-ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_HOST_PORT}:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - COHERE_API_KEY=${COHERE_API_KEY}
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./.agent:/.agent
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ═════════════════════════ FRONTEND ═════════════════════════

  frontend:
    build:
      context: ./my-nextjs
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_ADMIN_URL=/api/proxy
      - BACKEND_URL=http://gateway:8080
      - NEXT_PUBLIC_SIGNALR_URL=http://localhost:${SIGNALR_HOST_PORT}/notificationHub
    depends_on:
      - gateway
      - ai-service
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
