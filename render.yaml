# =============================================================
# Render Blueprint (render.yaml)
# Chuyển đổi từ docker-compose.yml
#
# Lưu ý về naming convention trên Render:
#   - Mỗi service có URL dạng: https://<name>.onrender.com
#   - Thay thế URL nội bộ (http://admin-service:8080) bằng URL Render
#   - Biến PORT được Render inject tự động (mặc định 10000)
#
# QUAN TRỌNG: Điền đúng giá trị cho các biến có chú thích
# "# ← THAY BẰNG GIÁ TRỊ THỰC" trước khi deploy.
# =============================================================

services:

  # ──────────────────────────────────────────────
  # 1. Administration Service (Auth + Business API)
  # ──────────────────────────────────────────────
  - type: web
    name: erp-admin-service
    env: docker
    region: singapore  # hoặc: oregon, frankfurt, ohio
    plan: standard     # starter | standard | pro
    dockerContext: .
    dockerfilePath: AdministrationService/Dockerfile
    healthCheckPath: /health/live
    envVars:
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ConnectionStrings__DefaultConnection
        sync: false  # ← Điền trong Render Dashboard > Environment
        # Ví dụ: Host=dpg-xxx.oregon-postgres.render.com;Port=5432;Database=erp_db;Username=erp_user;Password=SECRET
      - key: ASPNETCORE_ISSUER_URI
        # URL công khai của Gateway service trên Render
        value: https://erp-gateway.onrender.com  # ← THAY BẰNG URL GATEWAY THỰC
      - key: SignalRService__BaseUrl
        value: https://erp-signalr.onrender.com  # ← THAY BẰNG URL SIGNALR THỰC
      - key: Redis__Host
        fromService:
          name: erp-redis
          type: redis
          property: host
      - key: Redis__Port
        fromService:
          name: erp-redis
          type: redis
          property: port
      - key: Redis__Password
        fromService:
          name: erp-redis
          type: redis
          property: password

  # ──────────────────────────────────────────────
  # 2. Gateway Service (YARP Reverse Proxy)
  # ──────────────────────────────────────────────
  - type: web
    name: erp-gateway
    env: docker
    region: singapore
    plan: standard
    dockerContext: .
    dockerfilePath: GatewayService/Dockerfile
    healthCheckPath: /health/live
    envVars:
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ASPNETCORE_ISSUER_URI
        value: https://erp-gateway.onrender.com  # ← THAY BẰNG URL GATEWAY THỰC
      # YARP routes: trỏ đến URL công khai của các downstream service
      - key: ReverseProxy__Clusters__admin-cluster__Destinations__admin-service__Address
        value: https://erp-admin-service.onrender.com  # ← THAY BẰNG URL ADMIN THỰC
      - key: ReverseProxy__Clusters__signalr-cluster__Destinations__signalr-service__Address
        value: https://erp-signalr.onrender.com        # ← THAY BẰNG URL SIGNALR THỰC
      - key: JwtSettings__Authority
        value: https://erp-admin-service.onrender.com  # ← THAY BẰNG URL ADMIN THỰC
      - key: Redis__Host
        fromService:
          name: erp-redis
          type: redis
          property: host
      - key: Redis__Port
        fromService:
          name: erp-redis
          type: redis
          property: port
      - key: Redis__Password
        fromService:
          name: erp-redis
          type: redis
          property: password

  # ──────────────────────────────────────────────
  # 3. SignalR Service (Real-time Notifications)
  # ──────────────────────────────────────────────
  - type: web
    name: erp-signalr
    env: docker
    region: singapore
    plan: standard
    dockerContext: .
    dockerfilePath: SignalRService/Dockerfile
    healthCheckPath: /health/live
    envVars:
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: AllowedOrigins
        value: https://erp-frontend.onrender.com  # ← THAY BẰNG URL FRONTEND THỰC
      - key: Redis__Host
        fromService:
          name: erp-redis
          type: redis
          property: host
      - key: Redis__Port
        fromService:
          name: erp-redis
          type: redis
          property: port
      - key: Redis__Password
        fromService:
          name: erp-redis
          type: redis
          property: password

  # ──────────────────────────────────────────────
  # 4. File Service (MinIO File Storage API)
  # ──────────────────────────────────────────────
  - type: web
    name: erp-file-service
    env: docker
    region: singapore
    plan: starter
    dockerContext: .
    dockerfilePath: FileService/Dockerfile
    healthCheckPath: /health/live
    envVars:
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: AllowedOrigins
        value: https://erp-frontend.onrender.com  # ← THAY BẰNG URL FRONTEND THỰC
      # MinIO: dùng dịch vụ Object Storage bên ngoài (Cloudflare R2, AWS S3, hoặc MinIO tự host)
      # Render không hỗ trợ MinIO native — phải dùng external S3-compatible storage
      - key: MinIO__Endpoint
        sync: false  # ← Điền trong Render Dashboard (vd: s3.amazonaws.com hoặc <account>.r2.cloudflarestorage.com)
      - key: MinIO__AccessKey
        sync: false  # ← Điền trong Render Dashboard
      - key: MinIO__SecretKey
        sync: false  # ← Điền trong Render Dashboard
      - key: MinIO__UseSSL
        value: "true"
      - key: Seq__ServerUrl
        value: https://your-seq-instance.example.com  # ← THAY BẰNG URL SEQ THỰC (hoặc bỏ nếu không dùng)

  # ──────────────────────────────────────────────
  # 5. Frontend (Next.js)
  # ──────────────────────────────────────────────
  - type: web
    name: erp-frontend
    env: docker
    region: singapore
    plan: starter
    dockerContext: .
    dockerfilePath: my-nextjs/Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      # API URL mà browser client gọi (public)
      - key: NEXT_PUBLIC_API_ADMIN_URL
        value: https://erp-gateway.onrender.com  # ← THAY BẰNG URL GATEWAY THỰC
      # API URL mà Next.js server-side gọi (có thể dùng URL Render nếu không có private network)
      - key: BACKEND_URL
        value: https://erp-gateway.onrender.com  # ← THAY BẰNG URL GATEWAY THỰC
      - key: NEXT_PUBLIC_SIGNALR_URL
        value: https://erp-signalr.onrender.com  # ← THAY BẰNG URL SIGNALR THỰC
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

# ──────────────────────────────────────────────
# Managed Services (thay thế cho postgres & redis trong docker-compose)
# ──────────────────────────────────────────────

databases:
  - name: erp-postgres
    databaseName: erp_db
    user: erp_user
    region: singapore
    plan: starter  # starter (free) | standard | pro

  # Lưu ý: Render Managed Redis hiện chỉ hỗ trợ plan starter (free, 25MB)
  # Nếu cần dùng nhiều hơn, hãy dùng Upstash Redis (https://upstash.com) và điền thủ công
  - name: erp-redis
    type: redis
    region: singapore
    plan: starter
    ipAllowList: []  # [] = chỉ cho phép internal services trong cùng account
